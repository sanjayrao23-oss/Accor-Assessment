apiVersion: apps/v1
kind: Deployment

metadata:
name: redemption-api
namespace: redemption

spec:
replicas: 3

  strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
  maxSurge: 1

  selector:
  matchLabels:
  app: redemption-api

  template:
  metadata:
  labels:
  app: redemption-api
        
 
 spec:
      containers:
      - name: redemption-api

        image: 123456789.dkr.ecr.ap-south-1.amazonaws.com/redemption-api:v1

        ports:
        - containerPort: 8080


resources:
          requests:
            cpu: "500m"
            memory: "512Mi"

          limits:
            cpu: "500m"
            memory: "1Gi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
            initialDelaySeconds: 15
          periodSeconds: 5
