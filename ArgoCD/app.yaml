apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: redemption-app

spec:
  project: default

  source:
    repoURL: https://github.com/sanjayrao23-oss/Accor-Assessment
    targetRevision: main
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: redemption

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
